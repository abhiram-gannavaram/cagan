name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (core, cli, marketplace, turbo, swarm, vscode-extension)
        run: pnpm -r build

      - name: Run all tests
        run: pnpm -r test

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high || echo "WARNING: audit found issues (non-blocking on CI)"

  security-audit:
    name: Security Audit — No Telemetry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for telemetry libraries
        # cagan must NEVER include telemetry. This check fails the build if any are found.
        run: |
          echo "Scanning for telemetry references..."
          if grep -r "segment\|mixpanel\|amplitude\|analytics\.track\|telemetry\.send\|Sentry\.init\|datadog" \
               packages/ --include="*.ts" --exclude-dir="__tests__" --exclude-dir="node_modules"; then
            echo "ERROR: Telemetry reference found in source code. cagan must never collect user data."
            exit 1
          fi
          echo "PASS: No telemetry references found."

      - name: Check all network calls are documented
        # Every outbound HTTP call must have a // NETWORK: comment explaining what it sends and to where.
        run: |
          echo "Scanning for undocumented network calls..."
          UNDOCUMENTED=$(grep -rn "await fetch\|axios\.\(get\|post\|put\)" \
            packages/ --include="*.ts" \
            --exclude-dir="__tests__" \
            --exclude-dir="node_modules" | \
            grep -v "// NETWORK:" | \
            grep -v "test\|spec\|mock" || true)
          if [ -n "$UNDOCUMENTED" ]; then
            echo "ERROR: Undocumented network call(s) found:"
            echo "$UNDOCUMENTED"
            echo "All network calls must have a // NETWORK: comment."
            exit 1
          fi
          echo "PASS: All network calls are documented."

      - name: Check for hardcoded secrets patterns
        run: |
          echo "Scanning for hardcoded secret patterns..."
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}\|anthropic-api-key-[a-zA-Z0-9]\{20,\}\|HARDCODED_KEY" \
               packages/ --include="*.ts" \
               --exclude-dir="__tests__" \
               --exclude-dir="node_modules" \
               --exclude-dir="dist"; then
            echo "ERROR: Potential hardcoded secret found."
            exit 1
          fi
          echo "PASS: No hardcoded secrets detected."

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace packages (required for type resolution in dependent packages)
        run: pnpm -r build

      - name: Run lint (all packages)
        run: pnpm -r lint
