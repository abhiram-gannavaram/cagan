name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Verify NPM_TOKEN is set
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "ERROR: NPM_TOKEN secret is not set. Cannot publish."
            exit 1
          fi
          echo "NPM_TOKEN is present."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify Git tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          CORE_VERSION="v$(node -p "require('./packages/core/package.json').version")"
          if [ "$TAG" != "$CORE_VERSION" ]; then
            echo "ERROR: Git tag ($TAG) does not match @cagan/core version ($CORE_VERSION)"
            exit 1
          fi
          echo "Tag $TAG matches package version."

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Run tests before publish
        run: pnpm -r test

      - name: Security audit — no telemetry
        run: |
          if grep -r "segment\|mixpanel\|amplitude\|analytics\.track\|telemetry\.send" \
               packages/ --include="*.ts" --exclude-dir="__tests__" --exclude-dir="node_modules" --exclude-dir="dist"; then
            echo "ERROR: Telemetry found — refusing to publish."
            exit 1
          fi
          echo "PASS: No telemetry references."

      - name: Dependency vulnerability audit
        run: |
          pnpm audit --audit-level=high || {
            echo "ERROR: High-severity vulnerabilities found. Fix before publishing."
            exit 1
          }

      - name: Publish @cagan/core
        run: cd packages/core && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cagan/turbo
        run: cd packages/turbo && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cagan/swarm
        run: cd packages/swarm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cagan/cli
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cagan/marketplace
        run: cd packages/marketplace && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
