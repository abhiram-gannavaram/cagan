name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm -r build

      - name: Run tests before publish
        run: pnpm -r test

      - name: Security audit — no telemetry
        run: |
          if grep -r "segment\|mixpanel\|amplitude\|analytics\.track\|telemetry\.send" \
               packages/ --include="*.ts" --exclude-dir="__tests__" --exclude-dir="node_modules"; then
            echo "ERROR: Telemetry found — refusing to publish."
            exit 1
          fi

      - name: Publish @cagan/core
        run: |
          cd packages/core
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cagan/turbo
        run: |
          cd packages/turbo
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cagan/swarm
        run: |
          cd packages/swarm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cagan/cli
        run: |
          cd packages/cli
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cagan/marketplace
        run: |
          cd packages/marketplace
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
